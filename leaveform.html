<!DOCTYPE html>
<html>
<head>
<title>Student Leave Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: url(https://th.bing.com/th/id/OIP.pZM6k3Bda4r4xGz69XperAHaDs?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3);
    backdrop-filter: blur(5px);
}

.container{
    width:420px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input, textarea, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:12px;
    border-radius:6px;
    border:1px solid #ccc;
}

textarea{
    resize:none;
}

.section{
    margin-top:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Leave Application Form</h2>

<form action="submit.php" method="post">

<label>Student Name</label>
<input type="text" name="Sname" placeholder="Enter your name" required>

<label>Email ID</label>
<input type="email" name="email" placeholder="Enter email" required>

<label>Student ID</label>
<input type="number" name="Sid" placeholder="Enter your id" required>

<label>Leave Start Date</label>
<input type="date" name="startdate" min="2026-02-04" required>

<label>Leave End Date</label>
<input type="date" name="enddate" required>

<label>Reason Description</label>
<textarea name="Reason" placeholder="Enter reason here"></textarea>

<label>Phone Number</label>
<input type="tel" name="phnno" placeholder="12345-67890" pattern="[0-9]{5}-[0-9]{5}" required>

<div class="section">
<h4>Reason Type</h4>
<input type="radio" name="reasonType" value="Medical"> Medical <br>
<input type="radio" name="reasonType" value="Urgent"> Urgent <br>
<input type="radio" name="reasonType" value="Marriage"> Marriage <br>
<input type="radio" name="reasonType" value="Others"> Others
</div>

<textarea name="otherReason" placeholder="If other, specify"></textarea>

<div class="section">
<h4>Location</h4>
<input type="checkbox" name="location[]" value="Chandigarh"> Chandigarh <br>
<input type="checkbox" name="location[]" value="Shimla"> Shimla <br>
<input type="checkbox" name="location[]" value="Amritsar"> Amritsar <br>
<input type="checkbox" name="location[]" value="Delhi"> Delhi
</div>

<div class="section">
<h4>Hostel Block</h4>
<select name="Block[]" multiple size="3">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
</select>
</div>

<button type="submit" onclick="alert('Submitted successfully')">Submit</button>

</form>

</div>

</body>
</html>
