<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:linear-gradient(to right,rgb(148,161,171),rgb(187,165,187));
}

.box{
    width:320px;
    margin:120px auto;
    padding:25px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:green;
}

.captcha-box{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.captcha-box input{
    width:80px;
    margin:0;
}
</style>

<script>
let num1;
let num2;
let correctAnswer;

window.onload = function(){
    generateCaptcha();
};

function generateCaptcha(){
    num1 = Math.floor(Math.random() * 10) + 1;
    num2 = Math.floor(Math.random() * 10) + 1;
    correctAnswer = num1 + num2;

    document.getElementById("captchaQuestion").innerHTML =
        num1 + " + " + num2 + " = ?";
}

function validateForm(event){
    event.preventDefault();

    let username = document.getElementById("loginUsername").value;
    let password = document.getElementById("loginPassword").value;
    let captchaInput = document.getElementById("captchaInput").value;

    let storedData = localStorage.getItem("userData");

    if(!storedData){
        alert("No user found! Please signup first.");
        return;
    }

    let user = JSON.parse(storedData);

    if(captchaInput == ""){
        alert("Enter captcha!");
        return;
    }

    if(parseInt(captchaInput) !== correctAnswer){
        alert("Wrong captcha!");
        generateCaptcha();
        return;
    }

    if(username === user.username && password === user.password){
        alert("Login Successful!");
        window.location.href = "hostel.html";
    } else {
        alert("Invalid Username or Password!");
    }
}
</script>

</head>
<body>

<div class="box">
<h2>Login</h2>

<form onsubmit="validateForm(event)">
    <input type="text" id="loginUsername" placeholder="Username" required>
    <input type="password" id="loginPassword" placeholder="Password" required minlength="8">

    <div class="captcha-box">
        <span id="captchaQuestion"></span>
        <input type="number" id="captchaInput" placeholder="Answer">
    </div>

    <br>
    <button type="submit">Login</button>
</form>

<p style="text-align:center;">
    <a href="signup.html">New User? Sign Up</a>
</p>
</div>

</body>
</html>
